<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL</title>
  <style>
    /* Reset */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Globe container */
    #cesiumContainer {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }

    /* Remove Cesium default credit bar padding */
    .cesium-viewer-bottom { display: none !important; }
    .cesium-widget-credits { display: none !important; }

    /* Control panel — left sidebar */
    #control-panel {
      position: absolute;
      top: 12px; left: 12px;
      width: 200px;
      background: rgba(0, 0, 0, 0.80);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 6px;
      padding: 12px;
      z-index: 100;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #00ffc8;
      backdrop-filter: blur(6px);
    }

    .cp-section { margin-bottom: 14px; }
    .cp-section h3 {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 255, 200, 0.5);
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(0, 255, 200, 0.15);
      padding-bottom: 4px;
    }

    .cp-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      padding: 3px 0;
    }
    .cp-toggle input[type="checkbox"] {
      accent-color: #00ffc8;
      cursor: pointer;
    }
    .cp-toggle span { user-select: none; }

    .cp-shader-btn {
      display: inline-block;
      background: rgba(0, 255, 200, 0.08);
      border: 1px solid rgba(0, 255, 200, 0.2);
      color: #00ffc8;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      margin: 2px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }
    .cp-shader-btn:hover {
      background: rgba(0, 255, 200, 0.15);
    }
    .cp-shader-btn.active {
      background: rgba(0, 255, 200, 0.25);
      border-color: #00ffc8;
    }

    /* Info panel — click popup */
    #info-panel {
      position: absolute;
      top: 12px; right: 12px;
      width: 260px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 6px;
      padding: 12px;
      z-index: 100;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00ffc8;
      backdrop-filter: blur(6px);
    }
    .ip-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 255, 200, 0.5);
    }
    .ip-header button {
      background: none; border: none; color: #00ffc8;
      font-size: 16px; cursor: pointer;
    }
    .ip-body { line-height: 1.6; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
