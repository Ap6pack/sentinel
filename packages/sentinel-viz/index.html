<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL</title>
  <style>
    /* Reset */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Globe container */
    #cesiumContainer {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }

    /* Remove Cesium default credit bar padding */
    .cesium-viewer-bottom { display: none !important; }
    .cesium-widget-credits { display: none !important; }

    /* Control panel — left sidebar */
    #control-panel {
      position: absolute;
      top: 12px; left: 12px;
      width: 200px;
      background: rgba(0, 0, 0, 0.80);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 6px;
      padding: 12px;
      z-index: 100;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #00ffc8;
      backdrop-filter: blur(6px);
    }

    .cp-section { margin-bottom: 14px; }
    .cp-section h3 {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 255, 200, 0.5);
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(0, 255, 200, 0.15);
      padding-bottom: 4px;
    }

    .cp-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      padding: 3px 0;
    }
    .cp-toggle input[type="checkbox"] {
      accent-color: #00ffc8;
      cursor: pointer;
    }
    .cp-toggle span { user-select: none; }

    .cp-shader-btn {
      display: inline-block;
      background: rgba(0, 255, 200, 0.08);
      border: 1px solid rgba(0, 255, 200, 0.2);
      color: #00ffc8;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      margin: 2px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }
    .cp-shader-btn:hover {
      background: rgba(0, 255, 200, 0.15);
    }
    .cp-shader-btn.active {
      background: rgba(0, 255, 200, 0.25);
      border-color: #00ffc8;
    }

    /* Info panel — click popup */
    #info-panel {
      position: absolute;
      top: 12px; right: 12px;
      width: 260px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 6px;
      padding: 12px;
      z-index: 100;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #00ffc8;
      backdrop-filter: blur(6px);
    }
    .ip-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0, 255, 200, 0.5);
    }
    .ip-header button {
      background: none; border: none; color: #00ffc8;
      font-size: 16px; cursor: pointer;
    }
    .ip-body { line-height: 1.6; }

    /* Profile-specific InfoPanel styles */
    .ip-field { margin-bottom: 8px; }
    .ip-label {
      display: block;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(0, 255, 200, 0.45);
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    .ip-value { display: block; color: #00ffc8; }
    .ip-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    .ip-confidence {
      position: relative;
      height: 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .ip-conf-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .ip-conf-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    .ip-sources { display: flex; flex-wrap: wrap; gap: 4px; }
    .ip-tag {
      display: inline-block;
      background: rgba(0, 255, 200, 0.12);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      color: #00ffc8;
    }

    .ip-id-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .ip-id-table tr { border-bottom: 1px solid rgba(0, 255, 200, 0.1); }
    .ip-id-key {
      color: rgba(0, 255, 200, 0.5);
      padding: 2px 6px 2px 0;
      white-space: nowrap;
      vertical-align: top;
    }
    .ip-id-val {
      color: #00ffc8;
      padding: 2px 0;
      word-break: break-all;
    }
    /* Alert drawer — right sidebar */
    #alert-drawer {
      position: absolute;
      top: 12px; right: 12px;
      width: 300px;
      max-height: calc(100vh - 24px);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 60, 60, 0.3);
      border-radius: 6px;
      z-index: 90;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #ff6666;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
    }
    .ad-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 100, 100, 0.6);
      border-bottom: 1px solid rgba(255, 60, 60, 0.15);
      flex-shrink: 0;
    }
    .ad-count {
      background: rgba(255, 60, 60, 0.25);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      color: #ff6666;
    }
    .ad-toggle-btn {
      margin-left: auto;
      background: none; border: none;
      color: #ff6666; font-size: 16px; cursor: pointer;
    }
    .ad-list {
      overflow-y: auto;
      padding: 8px;
      flex: 1;
    }
    .ad-card {
      background: rgba(255, 60, 60, 0.06);
      border: 1px solid rgba(255, 60, 60, 0.15);
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .ad-card-top {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .ad-conf-bar-wrap {
      flex: 1;
      position: relative;
      height: 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .ad-conf-bar {
      height: 100%;
      border-radius: 3px;
    }
    .ad-conf-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }
    .ad-ts {
      font-size: 9px;
      color: rgba(255,100,100,0.4);
      white-space: nowrap;
    }
    .ad-summary {
      color: #ff8888;
      font-size: 12px;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .ad-section { margin-bottom: 5px; }
    .ad-section-label {
      display: block;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255,100,100,0.4);
      margin-bottom: 1px;
    }
    .ad-section-text {
      font-size: 10px;
      color: rgba(255,200,200,0.75);
      line-height: 1.4;
    }
    .ad-flyto {
      display: inline-block;
      background: rgba(255, 60, 60, 0.15);
      border: 1px solid rgba(255, 60, 60, 0.3);
      color: #ff6666;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: 3px;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .ad-flyto:hover {
      background: rgba(255, 60, 60, 0.3);
    }

    /* Move info-panel below alert-drawer when both are open */
    #info-panel { top: auto; bottom: 12px; right: 12px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
