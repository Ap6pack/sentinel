[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sentinel-rf"
version = "0.1.0"
description = "RF/SDR signal intelligence layer for SENTINEL"
requires-python = ">=3.11"
dependencies = [
    "sentinel-common",
    "flask>=3.0",
    "flask-socketio>=5.3",
    "gevent>=23.0",
    "httpx>=0.27",
    "gpsd-py3>=0.3",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "fakeredis>=2.21",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.hatch.build.targets.wheel]
packages = ["sentinel_rf"]
